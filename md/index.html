## LaTeX (Math Equations)
Scribe supports inline and block LaTeX rendered beautifully via KaTeX!

**Inline Math:** Euler's Identity is $e^{i\pi} + 1 = 0$.

**Block Math:** The quadratic formula is:

$$ x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a} $$

**Calculus & Integrals:**

$$ \int_{a}^{b} x^2 dx = \left[ \frac{x^3}{3} \right]_{a}^{b} = \frac{b^3 - a^3}{3} $$

**Matrices:**

$$
\begin{bmatrix}
1 & 2 & 3 \\
4 & 5 & 6 \\
7 & 8 & 9
\end{bmatrix}
$$

        a, b = b, a + b

    <script>
        const editor = document.getElementById('editor');
        const previewContent = document.getElementById('preview-content');

        // Init KaTeX into Marked
        if (window.markedKatex) {
            marked.use(window.markedKatex.default ? window.markedKatex.default({ throwOnError: false }) : window.markedKatex({ throwOnError: false }));
        }

        function updatePreview() {
            const markdown = editor.value;
            // Parse Markdown to HTML
            const html = marked.parse(markdown);
            previewContent.innerHTML = html;

            // Re-run Prism.js syntax highlighting
            if (window.Prism) {
                Prism.highlightAllUnder(previewContent);
            }
        }

        // Initialize and listen for changes
        editor.addEventListener('input', updatePreview);
        updatePreview(); // initial render

        function clearAll() {
            editor.value = '';
            updatePreview();
        }

        function downloadFile() {
            const headContent = document.head.innerHTML;
            const fullHtml = `<!DOCTYPE html>
<html lang="en">
<head>
    ${headContent}
</head>
<body class="bg-gray-50 p-8">
    <div id="preview-content" class="max-w-4xl mx-auto bg-white p-12 rounded-xl shadow-sm border border-gray-100">
        ${previewContent.innerHTML}
    </div>
</body>
</html>`;
            const blob = new Blob([fullHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        function downloadPDF() {
            const element = document.getElementById('preview-content');
            const opt = {
                margin: [10, 10, 10, 10],
                filename: 'document.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, letterRendering: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'avoid-all'] }
            };
            html2pdf().set(opt).from(element).save();
        }

        function downloadDocx() {
            const html = '<!DOCTYPE html><html><body>' + previewContent.innerHTML + '</body></html>';
            const converted = htmlDocx.asBlob(html);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(converted);
            a.download = 'document.docx';
            a.click();
        }
    </script>
